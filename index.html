<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚽ نتائج المباريات المباشرة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
            background: #0a0e17;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 2px solid #1a2332;
        }

        header h1 {
            font-size: 2.2rem;
            color: #00d4ff;
        }

        header p {
            color: #8899aa;
            margin-top: 8px;
            font-size: 1rem;
        }

        .live-badge {
            display: inline-block;
            background: #ff3333;
            color: #fff;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .match-card {
            background: linear-gradient(145deg, #141c2b, #0f1622);
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
            border: 1px solid #1e2a3a;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .match-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.08);
        }

        .match-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #8899aa;
            border-bottom: 1px solid #1a2332;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .status-live {
            color: #ff6b6b;
            font-weight: bold;
        }

        .status-finished {
            color: #51cf66;
        }

        .status-notstarted {
            color: #fcc419;
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .team .team-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .team .team-logo {
            font-size: 2rem;
        }

        .match-score {
            font-size: 2rem;
            font-weight: 800;
            color: #00d4ff;
            background: #0a0e17;
            padding: 8px 20px;
            border-radius: 12px;
            min-width: 80px;
            text-align: center;
        }

        .match-extra {
            display: flex;
            justify-content: space-between;
            margin-top: 14px;
            font-size: 0.85rem;
            color: #6a7a8a;
            border-top: 1px solid #1a2332;
            padding-top: 12px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .loading .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #1a2332;
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
            background: #1a0a0a;
            border-radius: 16px;
            border: 1px solid #ff3333;
        }

        .refresh-btn {
            background: #1a2332;
            border: 1px solid #2a3a4a;
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            margin: 20px auto;
            display: block;
        }

        .refresh-btn:hover {
            background: #00d4ff;
            color: #0a0e17;
            border-color: #00d4ff;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #4a5a6a;
            font-size: 0.8rem;
            border-top: 1px solid #1a2332;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5rem;
            }
            .match-teams {
                flex-direction: column;
                gap: 10px;
            }
            .match-score {
                font-size: 1.5rem;
                min-width: 60px;
                padding: 4px 14px;
            }
            .team .team-name {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ كرة القدم العالمية</h1>
            <p>نتائج المباريات المباشرة والمجدولة</p>
            <span class="live-badge">🔴 مباشر</span>
        </header>

        <button class="refresh-btn" onclick="loadMatches()">🔄 تحديث النتائج</button>

        <div id="matches-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>جاري تحميل المباريات...</p>
            </div>
        </div>

        <div class="footer">
            البيانات مقدمة من <span style="color:#00d4ff;">ESPN</span> • يتم التحديث تلقائياً كل 60 ثانية
        </div>
    </div>

    <script>
        // ============================================================
        //  هذا الموقع يعمل بدون مفتاح API - يستخدم مصدر ESPN العام
        //  يمكن نشره مباشرة على Vercel أو أي استضافة ملفات ثابتة
        // ============================================================

        async function loadMatches() {
            const container = document.getElementById('matches-container');

            // عرض حالة التحميل
            container.innerHTML = `
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>جاري تحديث النتائج...</p>
                        </div>
                    `;

            try {
                // مصدر مجاني تماماً لا يحتاج إلى مفتاح
                const response = await fetch(
                    'https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard'
                );

                if (!response.ok) {
                    throw new Error(`HTTP خطأ: ${response.status}`);
                }

                const data = await response.json();

                if (!data.events || data.events.length === 0) {
                    container.innerHTML = `
                                <div style="text-align:center;padding:40px;color:#8899aa;">
                                    🏟️ لا توجد مباريات حالياً<br />
                                    <span style="font-size:0.8rem;">تأكد من وجود مباريات اليوم</span>
                                </div>
                            `;
                    return;
                }

                // معالجة وعرض المباريات
                let html = '';
                data.events.forEach(event => {
                    const competition = event.competitions?.[0];
                    if (!competition) return;

                    const homeTeam = competition.competitors?.find(c => c.homeAway === 'home');
                    const awayTeam = competition.competitors?.find(c => c.homeAway === 'away');

                    if (!homeTeam || !awayTeam) return;

                    const homeScore = homeTeam.score || '0';
                    const awayScore = awayTeam.score || '0';

                    // تحديد حالة المباراة
                    let statusClass = 'status-notstarted';
                    let statusText = '⏳ لم تبدأ';

                    const statusType = competition.status?.type?.name || '';

                    if (statusType === 'STATUS_IN_PROGRESS' || statusType === 'IN_PROGRESS') {
                        statusClass = 'status-live';
                        statusText = '🔴 مباشر الآن';
                    } else if (statusType === 'STATUS_FINAL' || statusType === 'FINAL') {
                        statusClass = 'status-finished';
                        statusText = '✅ انتهت';
                    } else if (statusType === 'STATUS_HALFTIME') {
                        statusClass = 'status-live';
                        statusText = '⏸️ استراحة';
                    }

                    // استخراج اسم الدوري
                    const leagueName = competition.league?.name || event.league?.name || 'دوري';

                    // وقت المباراة
                    const matchDate = new Date(event.date);
                    const timeStr = matchDate.toLocaleTimeString('ar', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    html += `
                                <div class="match-card">
                                    <div class="match-status">
                                        <span>${leagueName}</span>
                                        <span class="${statusClass}">${statusText}</span>
                                    </div>
                                    <div class="match-teams">
                                        <div class="team">
                                            <span class="team-logo">⚪</span>
                                            <span class="team-name">${homeTeam.team?.displayName || homeTeam.team?.name || 'فريق'}</span>
                                        </div>
                                        <div class="match-score">
                                            ${homeScore} - ${awayScore}
                                        </div>
                                        <div class="team">
                                            <span class="team-logo">⚪</span>
                                            <span class="team-name">${awayTeam.team?.displayName || awayTeam.team?.name || 'فريق'}</span>
                                        </div>
                                    </div>
                                    <div class="match-extra">
                                        <span>🕐 ${timeStr}</span>
                                        <span>📅 ${matchDate.toLocaleDateString('ar')}</span>
                                    </div>
                                </div>
                            `;
                });

                container.innerHTML = html;

            } catch (error) {
                console.error('خطأ في جلب البيانات:', error);
                container.innerHTML = `
                            <div class="error">
                                ❌ تعذر تحميل البيانات<br />
                                <span style="font-size:0.9rem;color:#8899aa;">
                                    يرجى التحقق من اتصال الإنترنت والمحاولة مرة أخرى
                                </span>
                                <br /><br />
                                <button class="refresh-btn" onclick="loadMatches()" style="display:inline-block;">
                                    🔄 إعادة المحاولة
                                </button>
                            </div>
                        `;
            }
        }

        // تحميل المباريات فور تحميل الصفحة
        document.addEventListener('DOMContentLoaded', loadMatches);

        // تحديث تلقائي كل 60 ثانية
        setInterval(loadMatches, 60000);
    </script>
</body>
</html>
