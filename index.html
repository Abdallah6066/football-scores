    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #fbbf24;
            --dark: #0f172a;
            --light: #f8fafc;
            --green: #10b981;
            --red: #ef4444;
            --text: #1e293b;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideDown 0.6s ease-out 0.1s both;
        }

        .nav-tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .nav-tab:hover,
        .nav-tab.active {
            background: var(--accent);
            color: var(--dark);
            border-color: var(--accent);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideUp 0.6s ease-out 0.1s both;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--dark);
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.4);
        }

        /* Filter */
        .filter-section {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            animation: slideUp 0.6s ease-out 0.2s both;
        }

        .filter-section input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--secondary);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }

        .filter-section input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        /* Matches Grid */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            animation: slideUp 0.6s ease-out 0.3s both;
        }

        /* Match Card */
        .match-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            animation: popIn 0.4s ease-out;
        }

        .match-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }

        .match-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px;
            text-align: center;
        }

        .match-league {
            font-size: 0.85rem;
            opacity: 0.9;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .match-date {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .match-content {
            padding: 25px;
        }

        .teams-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .team {
            flex: 1;
            text-align: center;
        }

        .team-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .team-logo {
            width: 50px;
            height: 50px;
            margin: 0 auto 8px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .score-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
        }

        .score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
        }

        .vs-text {
            color: var(--secondary);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .match-status {
            text-align: center;
            padding: 10px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
            border-radius: 6px;
            margin-top: 15px;
            border-left: 4px solid var(--green);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            background: var(--green);
            color: white;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        .status-live {
            background: var(--red);
        }

        .status-time {
            font-size: 0.9rem;
            color: var(--green);
            margin-top: 8px;
            font-weight: 600;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        /* Error State */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--red);
            border-radius: 8px;
            padding: 20px;
            color: var(--red);
            text-align: center;
            margin: 20px 0;
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .matches-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .score {
                font-size: 2.5rem;
            }

            .teams-container {
                flex-direction: column;
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <script>
        const API_BASE = 'https://sports.bzzoiro.com/api/events/';
        const API_HEADERS = {
            'Authorization': 'Token 12b9681586c1a20911eec4ee9e9edd4e'
        };

        let allMatches = [];
        let autoRefreshInterval = null;
        let currentLeague = 'all';

        // تحميل المباريات
        async function loadMatches() {
            try {
                const container = document.getElementById('matchesContainer');
                container.innerHTML = `
                    <div class="loading" style="grid-column: 1 / -1;">
                        <div class="spinner"></div>
                        <p>جاري تحميل المباريات...</p>
                    </div>
                `;

                const response = await fetch(API_BASE, { headers: API_HEADERS });
                
                if (!response.ok) {
                    throw new Error('فشل في تحميل البيانات');
                }

                const data = await response.json();
                allMatches = data.results || [];

                if (allMatches.length === 0) {
                    showEmptyState();
                } else {
                    displayMatches(allMatches);
                }

                // تحديث العنوان
                document.title = `نتائج المباريات - ${allMatches.length} مباراة | movi.best`;
            } catch (error) {
                console.error('خطأ:', error);
                showError('حدث خطأ في تحميل البيانات. تحقق من رمزك المميز (API Token)');
            }
        }

        // عرض المباريات
        function displayMatches(matches) {
            const container = document.getElementById('matchesContainer');
            
            if (matches.length === 0) {
                showEmptyState();
                return;
            }

            container.innerHTML = matches.map((match, index) => {
                const homeTeam = match.home_team || { name: 'فريق' };
                const awayTeam = match.away_team || { name: 'فريق' };
                const homeScore = match.home_score || 0;
                const awayScore = match.away_score || 0;
                const isLive = match.status === 'live' || match.status === 'ongoing';
                const matchDate = new Date(match.start_date);
                const formattedDate = matchDate.toLocaleDateString('ar-SA', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                return `
                    <div class="match-card" style="animation-delay: ${index * 0.05}s">
                        <div class="match-header">
                            <div class="match-league">${match.league?.name || 'الدوري'}</div>
                            <div class="match-date">📅 ${formattedDate}</div>
                        </div>
                        <div class="match-content">
                            <div class="teams-container">
                                <div class="team">
                                    <div class="team-logo">${homeTeam.name.charAt(0)}</div>
                                    <div class="team-name">${homeTeam.name}</div>
                                </div>
                                <div class="score-container">
                                    <div class="score">${homeScore}</div>
                                    <div class="vs-text">VS</div>
                                    <div class="score">${awayScore}</div>
                                </div>
                                <div class="team">
                                    <div class="team-logo">${awayTeam.name.charAt(0)}</div>
                                    <div class="team-name">${awayTeam.name}</div>
                                </div>
                            </div>

                            <div class="match-status">
                                <span class="status-badge ${isLive ? 'status-live' : ''}">
                                    ${isLive ? '🔴 مباشر' : '✓ انتهت'}
                                </span>
                                <div class="status-time">
                                    ${isLive ? '⏱️ جاري المباراة' : '✓ المباراة انتهت'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // فلترة حسب الدوري
        function filterByLeague(league) {
            currentLeague = league;
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            if (league === 'all') {
                displayMatches(allMatches);
            } else {
                const filtered = allMatches.filter(match => {
                    const leagueName = match.league?.name?.toLowerCase() || '';
                    return leagueName.includes(league.toLowerCase());
                });
                displayMatches(filtered);
            }
        }

        // البحث والفلترة
        function filterMatches() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMatches.filter(match => {
                const homeTeam = match.home_team?.name || '';
                const awayTeam = match.away_team?.name || '';
                const league = match.league?.name || '';
                return homeTeam.toLowerCase().includes(searchTerm) ||
                       awayTeam.toLowerCase().includes(searchTerm) ||
                       league.toLowerCase().includes(searchTerm);
            });
            displayMatches(filtered);
        }

        // التحديث التلقائي
        function toggleAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                alert('تم إيقاف التحديث التلقائي');
            } else {
                autoRefreshInterval = setInterval(loadMatches, 30000);
                loadMatches();
                alert('تم تفعيل التحديث التلقائي كل 30 ثانية');
            }
        }

        // رسالة الخطأ
        function showError(message) {
            const container = document.getElementById('matchesContainer');
            container.innerHTML = `
                <div class="error-message" style="grid-column: 1 / -1;">
                    <strong>⚠️ خطأ:</strong> ${message}
                </div>
            `;
        }

        // الحالة الفارغة
        function showEmptyState() {
            const container = document.getElementById('matchesContainer');
            container.innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: white;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">⚽</div>
                    <h2>لا توجد مباريات</h2>
                    <p>حاول البحث عن فريق أو دوري آخر</p>
                </div>
            `;
        }

        // التحميل الأولي
        window.addEventListener('load', loadMatches);

        // تحسينات الأداء
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {
                // Service Worker غير متاح
            });
        }
    </script>
</body>
